name: Daily AI News

on:
  schedule:
    # 每天早上8点运行 (UTC时间，北京时间为16点)
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  collect-and-send-news:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 feedparser

    - name: Set up environment variables
      env:
        EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      run: |
        echo "EMAIL_USERNAME=${{ secrets.EMAIL_USERNAME }}" >> $GITHUB_ENV
        echo "EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}" >> $GITHUB_ENV

    - name: Run news collection and email sending
      env:
        EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      run: |
        python main.py

    - name: Upload newsletter as artifact
      uses: actions/upload-artifact@v4
      with:
        name: daily-ai-newsletter
        path: daily_ai_news.md

    - name: Commit and push newsletter
      if: success()
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add daily_ai_news.md
        git commit -m "Update daily AI newsletter - $(date +'%Y-%m-%d')" || echo "No changes to commit"
        git push || echo "No changes to push"